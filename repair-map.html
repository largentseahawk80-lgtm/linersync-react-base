<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LinerSync Repair Map Tap</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;background:#04101d;color:#f8fafc;font-family:system-ui}main{max-width:720px;margin:auto;padding:12px 12px 100px}.card{background:#0e1d33;border:1px solid #2a3a53;border-radius:22px;padding:14px;margin:10px 0}.eyebrow{color:#ff8e18;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.muted{color:#a8b8cf}button,a.btn{display:block;text-align:center;text-decoration:none;width:100%;box-sizing:border-box;min-height:48px;border:0;border-radius:14px;background:#1b3356;color:#fff;font-weight:900;margin:6px 0;padding:12px}.primary{background:linear-gradient(#ffb25a,#ff8e18)!important;color:#111!important}.danger{background:#7f1d1d!important}.map{height:62vh;min-height:390px;border:1px solid #2a3a53;border-radius:20px;overflow:hidden}.item{background:#07101d;border:1px solid #2a3a53;border-radius:14px;padding:10px;margin:8px 0}.pinlabel{background:#ff8e18;color:#111;border:2px solid white;border-radius:50%;width:34px;height:34px;display:grid;place-items:center;font-weight:900}.leaflet-div-icon{background:transparent;border:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}input,textarea{width:100%;box-sizing:border-box;background:#07101d;color:#fff;border:1px solid #2a3a53;border-radius:12px;padding:10px;margin:5px 0 10px}textarea{min-height:90px}.tabs{position:fixed;left:0;right:0;bottom:0;max-width:720px;margin:auto;background:#07101d;border-top:1px solid #2a3a53;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px}.status{position:fixed;left:12px;right:12px;bottom:62px;max-width:696px;margin:auto;background:#07101d;border:1px solid #2a3a53;border-radius:12px;padding:9px;color:#a8b8cf}.hide{display:none}@media(max-width:520px){.grid,.grid3{grid-template-columns:1fr}}</style></head><body><main><div class="card"><p class="eyebrow">LinerSync Map + Tap Capture</p><h1>Repair / DT Pins</h1><p class="muted">Drop Patch, Bead, or Destructive Test with GPS and see pins live on the map. P = Patch, B = Bead, DT = Destructive Test.</p></div><div id="tapCard" class="card"><p class="eyebrow">Quick Tap</p><div class="grid3"><button class="primary" onclick="quick('Patch')">Patch<br>P</button><button class="primary" onclick="quick('Bead')">Bead<br>B</button><button class="primary" onclick="quick('Destructive Test')">Destructive Test<br>DT</button></div></div><div id="formCard" class="card hide"><p class="eyebrow">Approve Pin</p><h2 id="rtype">Record</h2><p id="gpsText" class="muted"></p><label>Record ID<input id="repairId" placeholder="Example: R-001 or DT-001"></label><label>Seam<input id="seam" placeholder="Example: S10-S11"></label><label>Location<input id="loc" placeholder="Example: 43' N.OF SAT"></label><label>Verified By<input id="verified" value="SL"></label><label>Notes<textarea id="notes"></textarea></label><div class="grid"><button class="primary" onclick="approve()">Approve / Lock</button><button onclick="cancelCapture()">Cancel</button></div></div><div class="card"><p class="eyebrow">Live Map</p><div id="map" class="map"></div></div><div class="card"><p class="eyebrow">Pin List</p><div class="grid"><button onclick="exportKml()">Export KML</button><button onclick="exportJson()">Backup JSON</button></div><div id="list"></div></div></main><div class="status" id="status">Ready</div><div class="tabs"><button onclick="scrollToTop()">Tap</button><button onclick="document.getElementById('map').scrollIntoView()">Map</button><button onclick="document.getElementById('list').scrollIntoView()">List</button></div><script>const KEY='ls_combined_live_v2';let S=load(),pending=null,map,layer;function seed(){return{project:{name:'Mesquite WWTP Cell F',client:'WEE',site:'Mesquite WWTP',area:'Cell F',material:'60MIL',qcTech:'SL'},logs:[],queue:[],points:[],status:'Ready'}}function load(){try{return JSON.parse(localStorage.getItem(KEY))||seed()}catch(e){return seed()}}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function id(p){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function status(t){document.getElementById('status').textContent=t;S.status=t;save()}function code(t){return t==='Patch'?'P':t==='Bead'?'B':t==='Destructive Test'?'DT':'R'}function recordType(t){return t==='Destructive Test'?'DT':'Repair'}function gmaps(lat,lng){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(lat+','+lng)}function gps(cb){if(!navigator.geolocation){cb({err:'NO GPS'});return}navigator.geolocation.getCurrentPosition(p=>cb({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy),time:new Date().toISOString()}),e=>cb({err:e.message,time:new Date().toISOString()}),{enableHighAccuracy:true,timeout:12000,maximumAge:5000})}function quick(type){status('Capturing GPS for '+type+'...');gps(g=>{pending={type:recordType(type),repairType:type,gps:g,time:g.time||new Date().toISOString()};document.getElementById('tapCard').classList.add('hide');document.getElementById('formCard').classList.remove('hide');document.getElementById('rtype').textContent=code(type)+' '+type;document.getElementById('gpsText').textContent=g.lat?'GPS '+g.lat.toFixed(6)+', '+g.lng.toFixed(6)+' ±'+(g.acc||'')+'m':'GPS warning: '+g.err;document.getElementById('verified').value=S.project?.qcTech||'SL';status(g.lat?type+' GPS captured':'GPS warning: '+g.err)})}function cancelCapture(){pending=null;document.getElementById('formCard').classList.add('hide');document.getElementById('tapCard').classList.remove('hide');status('Capture cancelled')}function approve(){if(!pending)return;const fields={repairType:pending.repairType,recordType:pending.type,recordId:val('repairId'),seam:val('seam'),location:val('loc'),verifiedBy:val('verified'),notes:val('notes')};const log={id:id('LOG'),type:pending.type,title:(fields.recordId||code(fields.repairType)+' '+pending.type),status:'LOCKED',time:pending.time,fields,notes:fields.notes,gps:pending.gps};S.logs.unshift(log);if(log.gps&&log.gps.lat){S.points.unshift({id:id('PT'),logId:log.id,label:code(fields.repairType),gps:log.gps,fields,type:pending.type})}save();pending=null;['repairId','seam','loc','notes'].forEach(x=>document.getElementById(x).value='');document.getElementById('formCard').classList.add('hide');document.getElementById('tapCard').classList.remove('hide');status('Locked map pin');renderMap();document.getElementById('map').scrollIntoView()}function val(idv){return document.getElementById(idv).value.trim()}function icon(codeText){return L.divIcon({className:'leaflet-div-icon',html:'<div class="pinlabel">'+esc(codeText)+'</div>',iconSize:[34,34],iconAnchor:[17,17]})}function initMap(){map=L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,attribution:'© OpenStreetMap'}).addTo(map);layer=L.layerGroup().addTo(map);renderMap()}function renderMap(){const pts=(S.points||[]).filter(p=>p.gps&&p.gps.lat&&p.gps.lng);layer.clearLayers();if(!pts.length){map.setView([32.293263,-106.776914],18);document.getElementById('list').innerHTML='<p class="muted">No GPS pins yet. Tap Patch, Bead, or Destructive Test, allow GPS, then Approve / Lock.</p>';return}const bounds=[];pts.forEach((p,i)=>{const lat=Number(p.gps.lat),lng=Number(p.gps.lng),c=p.label||'R';bounds.push([lat,lng]);L.marker([lat,lng],{icon:icon(c)}).addTo(layer).bindPopup('<b>'+esc(c)+' '+esc(p.type||'Repair')+'</b><br>'+esc(p.fields?.recordId||p.fields?.repairId||'')+'<br>'+esc(p.fields?.seam||'')+'<br>'+esc(p.fields?.location||'')+'<br><a target="_blank" href="'+gmaps(lat,lng)+'">Open in Google Maps</a>')});map.fitBounds(bounds,{padding:[40,40],maxZoom:20});document.getElementById('list').innerHTML=pts.map((p,i)=>{const lat=Number(p.gps.lat),lng=Number(p.gps.lng);return '<div class="item"><b>'+esc(p.label||'R')+' '+esc(p.fields?.recordId||p.fields?.repairId||p.type||'Pin '+(i+1))+'</b><p class="muted">'+lat.toFixed(6)+', '+lng.toFixed(6)+' · '+esc(p.fields?.seam||'')+' · '+esc(p.fields?.location||'')+'</p><div class="grid"><a class="btn primary" target="_blank" href="'+gmaps(lat,lng)+'">Open in Google Maps</a><button onclick="copyGps('+lat+','+lng+')">Copy GPS</button></div></div>'}).join('')}function copyGps(lat,lng){navigator.clipboard.writeText(lat+','+lng);status('GPS copied')}function exportJson(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});dl('linersync-repair-dt-map-backup.json',b)}function exportKml(){const pts=(S.points||[]).filter(p=>p.gps&&p.gps.lat&&p.gps.lng);const body=pts.map(p=>'<Placemark><name>'+esc(p.label)+' '+esc(p.fields?.recordId||p.fields?.repairId||'')+'</name><description>'+esc((p.type||'Repair')+' '+(p.fields?.seam||'')+' '+(p.fields?.location||''))+'</description><Point><coordinates>'+p.gps.lng+','+p.gps.lat+',0</coordinates></Point></Placemark>').join('');dl('linersync-repair-dt-pins.kml',new Blob(['<?xml version="1.0"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>'+body+'</Document></kml>'],{type:'application/vnd.google-earth.kml+xml'}))}function dl(name,blob){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}initMap();status(S.status||'Ready')</script></body></html>
