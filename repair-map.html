<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LinerSync Repair Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>body{margin:0;background:#04101d;color:#f8fafc;font-family:system-ui}main{max-width:720px;margin:auto;padding:12px 12px 90px}.card{background:#0e1d33;border:1px solid #2a3a53;border-radius:22px;padding:14px;margin:10px 0}.eyebrow{color:#ff8e18;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.muted{color:#a8b8cf}button,a.btn{display:block;text-align:center;text-decoration:none;width:100%;box-sizing:border-box;min-height:48px;border:0;border-radius:14px;background:#1b3356;color:#fff;font-weight:900;margin:6px 0;padding:12px}.primary{background:linear-gradient(#ffb25a,#ff8e18)!important;color:#111!important}.map{height:72vh;min-height:420px;border:1px solid #2a3a53;border-radius:20px;overflow:hidden}.item{background:#07101d;border:1px solid #2a3a53;border-radius:14px;padding:10px;margin:8px 0}.pinlabel{background:#ff8e18;color:#111;border:2px solid white;border-radius:50%;width:32px;height:32px;display:grid;place-items:center;font-weight:900}.leaflet-div-icon{background:transparent;border:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:520px){.grid{grid-template-columns:1fr}}</style></head><body><main><div class="card"><p class="eyebrow">LinerSync Map Overlay</p><h1>Repair Pins</h1><p class="muted">Live GPS repair pins from the mini app. P = Patch, B = Bead, DP = Detail Patch.</p><a class="btn primary" href="./index.html">Back to Tap App</a></div><div class="card"><div id="map" class="map"></div></div><div class="card"><p class="eyebrow">Repair List</p><div id="list"></div></div></main><script>const KEY='ls_combined_live_v2';function load(){try{return JSON.parse(localStorage.getItem(KEY))||{points:[],logs:[]}}catch(e){return{points:[],logs:[]}}}function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}function gmaps(lat,lng){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(lat+','+lng)}function labelFor(p){return p.label||'R'}function init(){const S=load();const pts=(S.points||[]).filter(p=>p.gps&&p.gps.lat&&p.gps.lng);const map=L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,attribution:'© OpenStreetMap'}).addTo(map);if(!pts.length){map.setView([32.293263,-106.776914],18);document.getElementById('list').innerHTML='<p class="muted">No GPS repair pins yet. Go back to the Tap App, tap Patch/Bead/Detail Patch, allow GPS, then Approve / Lock.</p>';return}const bounds=[];pts.forEach((p,i)=>{const lat=Number(p.gps.lat),lng=Number(p.gps.lng);bounds.push([lat,lng]);const code=labelFor(p);const icon=L.divIcon({className:'leaflet-div-icon',html:'<div class="pinlabel">'+esc(code)+'</div>',iconSize:[32,32],iconAnchor:[16,16]});L.marker([lat,lng],{icon}).addTo(map).bindPopup('<b>'+esc(code)+' Repair</b><br>Lat: '+lat.toFixed(6)+'<br>Lng: '+lng.toFixed(6)+'<br><a target="_blank" href="'+gmaps(lat,lng)+'">Open in Google Maps</a>')});map.fitBounds(bounds,{padding:[40,40],maxZoom:20});document.getElementById('list').innerHTML=pts.map((p,i)=>{const lat=Number(p.gps.lat),lng=Number(p.gps.lng);return '<div class="item"><b>'+esc(labelFor(p))+' Repair '+(i+1)+'</b><p class="muted">'+lat.toFixed(6)+', '+lng.toFixed(6)+' · accuracy '+esc(p.gps.acc||p.gps.accuracy||'')+'</p><div class="grid"><a class="btn primary" target="_blank" href="'+gmaps(lat,lng)+'">Open in Google Maps</a><button onclick="navigator.clipboard.writeText(\''+lat+','+lng+'\')">Copy GPS</button></div></div>'}).join('')}init()</script></body></html>
