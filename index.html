<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LinerSync Combined</title><style>body{margin:0;background:#04101d;color:#f8fafc;font-family:system-ui}main{max-width:640px;margin:auto;padding:14px 12px 90px}.card{background:#0e1d33;border:1px solid #2a3a53;border-radius:22px;padding:16px;margin:12px 0}.logo{width:72px;height:72px;border:4px solid #ff8e18;border-radius:20px;display:grid;place-items:center;color:#ff8e18;font-weight:900;font-size:26px}h1{font-size:44px;margin:0}.brand{display:flex;gap:14px;align-items:center}.muted{color:#a8b8cf}.eyebrow{color:#ff8e18;font-weight:900;text-transform:uppercase;letter-spacing:.08em}button,input,textarea,select{font:inherit}button{width:100%;min-height:54px;border:0;border-radius:16px;background:#1b3356;color:#fff;font-weight:900;margin:5px 0;padding:12px}.primary{background:linear-gradient(#ffb25a,#ff8e18);color:#111}.grid{display:grid;gap:8px}.three{grid-template-columns:repeat(3,1fr)}@media(max-width:520px){.three{grid-template-columns:1fr}}input,textarea,select{width:100%;box-sizing:border-box;background:#07101d;color:#fff;border:1px solid #2a3a53;border-radius:12px;padding:10px;margin:5px 0 10px}textarea{min-height:130px}.stat{background:#07101d;border:1px solid #2a3a53;border-radius:14px;padding:12px}.big{color:#ff8e18;font-size:30px;font-weight:900}.item{background:#07101d;border:1px solid #2a3a53;border-radius:14px;padding:10px;margin:8px 0}.tabs{position:fixed;bottom:0;left:0;right:0;max-width:640px;margin:auto;background:#07101d;border-top:1px solid #2a3a53;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px}.tabs button{font-size:12px;min-height:42px}.map{height:330px;background:linear-gradient(135deg,#102645,#07101d);border:1px solid #2a3a53;border-radius:18px;position:relative}.pin{position:absolute;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:#ff8e18;color:#111;display:grid;place-items:center;font-weight:900;border:2px solid #fff}.status{position:fixed;left:12px;right:12px;bottom:62px;max-width:616px;margin:auto;background:#07101d;border:1px solid #2a3a53;border-radius:12px;padding:9px;color:#a8b8cf}</style></head><body><div id="app"></div><script>var K='ls_combined_live_v2',tab='home',pending=null,S=load();function seed(){return{project:{name:'Mesquite WWTP Cell F',client:'WEE',site:'Mesquite WWTP',area:'Cell F',material:'60MIL',qcTech:'SL'},logs:[],queue:[],points:[],status:'Ready'}}function load(){try{return JSON.parse(localStorage.getItem(K))||seed()}catch(e){return seed()}}function save(){localStorage.setItem(K,JSON.stringify(S))}function id(p){return p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7)}function e(s){return String(s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}function setTab(t){tab=t;draw()}function gps(cb){if(!navigator.geolocation){cb({err:'NO GPS'});return}navigator.geolocation.getCurrentPosition(function(p){cb({lat:p.coords.latitude,lng:p.coords.longitude,acc:Math.round(p.coords.accuracy)})},function(x){cb({err:x.message})},{enableHighAccuracy:true,timeout:12000})}function code(t){return t==='Patch'?'P':t==='Bead'?'B':t==='Detail Patch'?'DP':'R'}function quick(t){S.status='Capturing GPS...';draw();gps(function(g){pending={type:'Repair',fields:{repairType:t,verifiedBy:S.project.qcTech,date:new Date().toLocaleDateString()},notes:'',gps:g,time:new Date().toISOString()};S.status=g.err?'GPS warning '+g.err:t+' GPS captured';tab='capture';draw()})}function approve(){var l={id:id('LOG'),title:code(pending.fields.repairType)+' Repair',status:'LOCKED',time:pending.time,type:'Repair',fields:pending.fields,notes:pending.notes,gps:pending.gps};S.logs.unshift(l);if(l.gps.lat)S.points.unshift({id:id('PT'),logId:l.id,label:code(l.fields.repairType),x:50+Math.random()*20-10,y:50+Math.random()*20-10,gps:l.gps});pending=null;S.status='Locked repair';tab='home';save();draw()}function parse(){var txt=document.getElementById('paste').value,rows=txt.split(/\r?\n/).map(function(r){return r.split('\t').map(function(c){return c.trim()})}).filter(function(r){return r.some(Boolean)});if(!rows.length){S.status='Paste rows first';draw();return}var typ=document.getElementById('typ').value,start=/date|panel|seam|roll|pressure|repair|dt/i.test(rows[0].join(' '))?1:0,n=0;for(var i=start;i<rows.length;i++){var r=rows[i],f={},w=[];if(typ==='AUTO'){var h=rows[0].join(' ').toUpperCase();typ=h.includes('AIR')?'Air Test':h.includes('DT')?'DT':h.includes('REPAIR')?'Repair':h.includes('SEAM')?'Seam':'Panel'}if(typ==='Panel'){f={date:r[0],panel:r[1],roll:r[2],width:r[3],length:r[4],comments:r[5],sqFt:r[6]};if(!f.panel||!f.roll)w.push('missing panel/roll')}else if(typ==='Air Test'){f={date:r[0],seam:r[1],startTime:r[2],startPsi:r[3],endTime:r[4],endPsi:r[5],result:r[6],tester:r[7]};if(!f.result)w.push('result blank')}else if(typ==='Repair'){f={repairId:r[0],seam:r[1],date:r[2],repairType:r[4],leaks:r[5],retest:r[6]};if(!f.repairType)w.push('missing repair type')}else if(typ==='DT'){f={date:r[0],dtNumber:r[1],welder:r[2],machine:r[3],temp:r[4],speed:r[5],seam:r[6],location:r[7]}}else{f={date:r[0],time:r[1],seam:r[2],welder:r[3],machine:r[4],temp:r[5],speed:r[6]}}S.queue.unshift({id:id('Q'),type:typ,title:f.panel||f.seam||f.repairId||f.dtNumber||typ,fields:f,warnings:w});n++}S.status='Parsed '+n+' rows';tab='review';save();draw()}function acc(qid){var q=S.queue.find(function(x){return x.id===qid});if(!q)return;S.queue=S.queue.filter(function(x){return x.id!==qid});S.logs.unshift({id:id('LOG'),type:q.type,title:q.title,status:'LOCKED',time:new Date().toISOString(),fields:q.fields});S.status='Accepted '+q.type;save();draw()}function rej(qid){S.queue=S.queue.filter(function(x){return x.id!==qid});save();draw()}function del(idv){S.logs=S.logs.filter(function(x){return x.id!==idv});S.points=S.points.filter(function(x){return x.logId!==idv});save();draw()}function dl(n,t,m){var b=new Blob([t],{type:m}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}function backup(){dl('linersync_backup.json',JSON.stringify(S,null,2),'application/json')}function csv(){dl('linersync_logs.csv','type,title,status,time,fields\n'+S.logs.map(function(l){return [l.type,l.title,l.status,l.time,JSON.stringify(l.fields)].map(function(x){return '"'+String(x||'').replaceAll('"','""')+'"'}).join(',')}).join('\n'),'text/csv')}function kml(){dl('linersync_repairs.kml','<?xml version="1.0"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>'+S.points.map(function(p){return'<Placemark><name>'+p.label+'</name><Point><coordinates>'+p.gps.lng+','+p.gps.lat+',0</coordinates></Point></Placemark>'}).join('')+'</Document></kml>','application/vnd.google-earth.kml+xml')}function pageHome(){return'<main><div class="card"><div class="brand"><div class="logo">LS</div><div><h1>LinerSync</h1><p class="muted">AI Excel Tap Lab + Cloud Backup Base</p></div></div><button class="primary" onclick="setTab(\'tap\')">OPEN FIELD APP</button><div class="grid"><div class="stat">Project<br><b>'+e(S.project.name)+'</b></div><div class="stat">Total Logs <span class="big">'+S.logs.length+'</span></div><div class="stat">Review Queue <span class="big">'+S.queue.length+'</span></div></div><div class="item"><b>Cloud backup base</b><p class="muted">Supabase-ready. Local backup/export works now.</p></div></div></main>'}function pageTap(){return'<main><div class="card"><p class="eyebrow">Quick Repair Tap</p><button class="primary" onclick="quick(\'Patch\')">Patch P</button><button class="primary" onclick="quick(\'Bead\')">Bead B</button><button class="primary" onclick="quick(\'Detail Patch\')">Detail Patch DP</button></div></main>'}function pageCapture(){var f=pending.fields;return'<main><div class="card"><p class="eyebrow">Repair Capture</p><h2>'+code(f.repairType)+' '+f.repairType+'</h2><p class="muted">GPS '+(pending.gps.lat?pending.gps.lat.toFixed(6)+','+pending.gps.lng.toFixed(6):pending.gps.err)+'</p><label>Repair ID<input oninput="pending.fields.repairId=this.value"></label><label>Seam<input oninput="pending.fields.seam=this.value"></label><label>Location<input oninput="pending.fields.location=this.value"></label><label>Verified By<input value="'+e(f.verifiedBy)+'" oninput="pending.fields.verifiedBy=this.value"></label><label>Notes<textarea oninput="pending.notes=this.value"></textarea></label><button class="primary" onclick="approve()">Approve / Lock</button></div></main>'}function pageImport(){return'<main><div class="card"><p class="eyebrow">Excel Import</p><select id="typ"><option>AUTO</option><option>Panel</option><option>Repair</option><option>Air Test</option><option>DT</option><option>Seam</option></select><textarea id="paste" placeholder="Paste Excel rows here"></textarea><button class="primary" onclick="parse()">Parse / Review Import</button></div></main>'}function pageReview(){return'<main><div class="card"><h2>Review Queue</h2>'+S.queue.map(function(q){return'<div class="item"><b>'+e(q.type)+' '+e(q.title)+'</b><p class="muted">'+e(q.warnings.join('; ')||'Clean')+'</p><button class="primary" onclick="acc(\''+q.id+'\')">Accept</button><button onclick="rej(\''+q.id+'\')">Reject</button></div>'}).join('')+'</div></main>'}function pageLogs(){return'<main><div class="card"><h2>Logs</h2>'+S.logs.map(function(l){return'<div class="item"><b>'+e(l.type)+' '+e(l.title)+'</b><pre>'+e(JSON.stringify(l.fields,null,2))+'</pre><button onclick="del(\''+l.id+'\')">Delete</button></div>'}).join('')+'</div></main>'}function pageMap(){return'<main><div class="card"><h2>As-Built Map</h2><div class="map">'+S.points.map(function(p){return'<div class="pin" style="left:'+p.x+'%;top:'+p.y+'%">'+p.label+'</div>'}).join('')+'</div></div></main>'}function pageSettings(){return'<main><div class="card"><h2>Settings / Export</h2><label>Project<input value="'+e(S.project.name)+'" oninput="S.project.name=this.value;save()"></label><label>Client<input value="'+e(S.project.client)+'" oninput="S.project.client=this.value;save()"></label><label>Site<input value="'+e(S.project.site)+'" oninput="S.project.site=this.value;save()"></label><label>Area<input value="'+e(S.project.area)+'" oninput="S.project.area=this.value;save()"></label><button onclick="backup()">JSON Backup</button><button onclick="csv()">CSV Export</button><button onclick="kml()">KML Export</button></div></main>'}function draw(){var html=tab==='home'?pageHome():tab==='tap'?pageTap():tab==='capture'?pageCapture():tab==='import'?pageImport():tab==='review'?pageReview():tab==='logs'?pageLogs():tab==='map'?pageMap():pageSettings();document.getElementById('app').innerHTML=html+'<div class="status">'+e(S.status)+'</div><div class="tabs"><button onclick="setTab(\'home\')">Home</button><button onclick="setTab(\'tap\')">Tap</button><button onclick="setTab(\'import\')">Import</button><button onclick="setTab(\'logs\')">Logs</button><button onclick="setTab(\'map\')">Map</button></div>';if(tab==='capture'){} }draw()</script></body></html>
